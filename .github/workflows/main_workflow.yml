name: Market Monitor

on:
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - run: pip install -r requirements.txt
    
    - name: Run market monitor
      run: python market_monitor.py
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: market-stats
        path: market_stats_*.xlsx